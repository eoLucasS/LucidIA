# Configuração de Portais - LucidIA
# Copie para portals.yml na raiz do projeto e customize.

# Filtro de títulos para o scanner
title_filter:
  # Pelo menos 1 keyword positivo deve estar presente no título
  positive:
    - "engineer"
    - "developer"
    - "desenvolvedor"
    - "backend"
    - "frontend"
    - "full stack"
    - "fullstack"
    - "devops"
    - "sre"
    - "platform"
    - "data engineer"
    - "tech lead"
    - "software"
    - "arquiteto"
    - "architect"

  # Se qualquer keyword negativo estiver presente, a vaga é descartada
  negative:
    - "estágio"
    - "intern"
    - "aprendiz"
    - "trainee"
    - "vendas"
    - "sales"
    - "marketing"
    - "designer"
    - "product manager"
    - "recruiter"
    - "analista de suporte"
    - "helpdesk"

  # Boost de senioridade (prioriza mas não bloqueia)
  seniority_boost:
    - "senior"
    - "sênior"
    - "pleno"
    - "staff"
    - "lead"
    - "principal"

