# Queries de busca para descoberta ampla
# Executadas via WebSearch no modo scan
search_queries:
  # Portais ATS
  - "site:boards.greenhouse.io brasil OR remote engineer OR developer"
  - "site:jobs.lever.co brasil OR remote engineer OR developer"
  - "site:jobs.ashbyhq.com brasil OR remote engineer OR developer"
  - "site:apply.workable.com brasil engineer OR developer"

  # Plataformas brasileiras
  - "site:gupy.io vaga desenvolvedor OR engineer remoto"
  - "site:programathor.com.br vaga desenvolvedor sênior"
  - "site:gekhunter.com vaga tecnologia"
  - "site:inhire.app vaga desenvolvedor"

  # LinkedIn
  - "site:linkedin.com/jobs vaga desenvolvedor brasil remoto"

# APIs diretas (consultadas pelo scanner sem usar tokens do Claude)
api_endpoints:
  greenhouse:
    - "https://boards-api.greenhouse.io/v1/boards/nubank/jobs"
    - "https://boards-api.greenhouse.io/v1/boards/creditas/jobs"
    - "https://boards-api.greenhouse.io/v1/boards/vtex/jobs"
    - "https://boards-api.greenhouse.io/v1/boards/loft42/jobs"
    - "https://boards-api.greenhouse.io/v1/boards/wildlifestudios/jobs"

# Vagas para ignorar (URLs já vistas e descartadas manualmente)
denylist: []
